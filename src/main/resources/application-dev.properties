spring.application.name=ecommerce
spring.datasource.url=jdbc:mysql://localhost:3306/ECOMMERCE_dev
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# 1. Força a inicialização sempre
spring.sql.init.mode=always

# 2. Garante que o Hibernate crie as tabelas primeiro (se usado JPA)
spring.jpa.defer-datasource-initialization=true

# 3. (Opcional) Define a plataforma para scripts específicos (ex: schema-mysql.sql)
# spring.sql.init.platform=mysql

# 4. (Opcional) Ignora erros na inicialização (útil se o script rodar mais de uma vez)
# spring.sql.init.continue-on-error=true